<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>神秘塔羅牌抽卡</title>
    <style>
        :root {
            --gold: #d4af37;
            --dark-blue: #1a1a2e;
            --white: #fdfbf7;
        }

        body {
            background-color: #0f0f1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            color: var(--white);
        }

        h1 {
            margin-bottom: 20px;
            letter-spacing: 5px;
            color: var(--gold);
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        /* 牌卡容器 */
        .tarot-container {
            width: 260px;
            height: 450px;
            perspective: 1000px;
            cursor: pointer;
        }

        /* 翻轉內層 */
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            border-radius: 15px;
        }

        /* 翻轉狀態 */
        .tarot-container.is-flipped .card-inner {
            transform: rotateY(180deg);
        }

        /* 正反面共用樣式 */
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            border: 4px solid var(--gold);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        /* 卡片背面 (蓋牌) */
        .card-back {
            background: radial-gradient(circle, #16213e 0%, #1a1a2e 100%);
            background-image: 
                repeating-linear-gradient(45deg, rgba(212,175,55,0.1) 0px, rgba(212,175,55,0.1) 2px, transparent 2px, transparent 10px),
                repeating-linear-gradient(-45deg, rgba(212,175,55,0.1) 0px, rgba(212,175,55,0.1) 2px, transparent 2px, transparent 10px);
        }

        .card-back::after {
            content: "✧";
            font-size: 50px;
            color: var(--gold);
        }

        /* 卡片正面 (開牌) */
        .card-front {
            background-color: var(--white);
            color: #333;
            transform: rotateY(180deg);
            padding: 20px;
            text-align: center;
        }

        .card-image {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .card-name {
            font-size: 24px;
            font-weight: bold;
            margin: 10px 0;
            color: #1a1a2e;
        }

        .card-desc {
            font-size: 14px;
            line-height: 1.5;
            color: #666;
        }

        /* 按鈕樣式 */
        .btn-reset {
            margin-top: 30px;
            padding: 10px 25px;
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-reset:hover {
            background: var(--gold);
            color: var(--dark-blue);
        }

        /* 逆位樣式 */
        .reversed {
            transform: rotateX(180deg) rotateY(180deg) !important;
        }
    </style>
</head>
<body>

    <h1>TAROT READING</h1>

    <div class="tarot-container" id="tarotCard">
        <div class="card-inner" id="cardInner">
            <div class="card-back"></div>
            <div class="card-front" id="cardFront">
                <div class="card-image" id="emoji">🃏</div>
                <div class="card-name" id="name">載入中...</div>
                <div class="card-desc" id="desc">點擊牌面來揭曉你的命運</div>
            </div>
        </div>
    </div>

    <button class="btn-reset" onclick="resetCard()">重新洗牌</button>

    <script>
        // 塔羅牌數據庫
        const tarotDeck = [
            { name: "愚者 (The Fool)", emoji: "🌅", desc: "新的開始、冒險、純真、自發性。" },
            { name: "魔術師 (The Magician)", emoji: "🪄", desc: "意志力、創造力、顯化、能力。" },
            { name: "女祭司 (The High Priestess)", emoji: "🌙", desc: "直覺、潛意識、神秘、內在智慧。" },
            { name: "戀人 (The Lovers)", emoji: "💖", desc: "愛、和諧、關係、價值觀選擇。" },
            { name: "死神 (Death)", emoji: "💀", desc: "結束、轉變、過渡、放手。" },
            { name: "命運之輪 (Wheel of Fortune)", emoji: "🎡", desc: "運氣、轉機、週期、不可抗力。" }
        ];

        const card = document.getElementById('tarotCard');
        const cardInner = document.getElementById('cardInner');
        let isFlipped = false;

        card.addEventListener('click', function() {
            if (!isFlipped) {
                drawCard();
                this.classList.add('is-flipped');
                isFlipped = true;
            }
        });

        function drawCard() {
            // 隨機選一張牌
            const randomIndex = Math.floor(Math.random() * tarotDeck.length);
            const selected = tarotDeck[randomIndex];
            
            // 隨機判定正逆位 (50% 機率)
            const isReversed = Math.random() > 0.5;

            // 更新內容
            document.getElementById('name').textContent = selected.name + (isReversed ? " [逆位]" : " [正位]");
            document.getElementById('emoji').textContent = selected.emoji;
            document.getElementById('desc').textContent = isReversed ? "逆位可能暗示能量受阻、過度或延遲。" : selected.desc;

            // 如果是逆位，旋轉正面內容
            if (isReversed) {
                document.getElementById('cardFront').style.transform = "rotateY(180deg) rotateZ(180deg)";
            } else {
                document.getElementById('cardFront').style.transform = "rotateY(180deg) rotateZ(0deg)";
            }
        }

        function resetCard() {
            card.classList.remove('is-flipped');
            isFlipped = false;
        }
    </script>
</body>
</html>
