<!DOCTYPE html>
<html lang="zh-Hant" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>塔羅 · 神秘占卜</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600;700&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    /* ─── CSS Variables ─── */
    :root {
      --radius-card: 20px;
      --radius-btn: 50px;
      --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      --font-display: 'Cinzel Decorative', serif;
      --font-body: 'Noto Serif TC', serif;
    }

    /* DARK THEME */
    [data-theme="dark"] {
      --bg: #0c0c14;
      --bg2: #13131f;
      --bg3: #1c1c2e;
      --surface: rgba(255,255,255,0.06);
      --surface2: rgba(255,255,255,0.10);
      --border: rgba(255,255,255,0.12);
      --text: #f0eee8;
      --text2: rgba(240,238,232,0.65);
      --text3: rgba(240,238,232,0.38);
      --gold: #e8c96a;
      --gold2: #b8962a;
      --accent-a: #9b7de8;
      --accent-b: #6dc0f5;
      --accent-c: #f08080;
      --card-bg: linear-gradient(145deg, #1c1a32 0%, #131224 100%);
      --card-face: linear-gradient(160deg, #fdf8ee 0%, #f5edd8 100%);
      --glow: rgba(232,201,106,0.25);
      --shimmer: rgba(255,255,255,0.04);
    }

    /* LIGHT THEME */
    [data-theme="light"] {
      --bg: #f2f0ec;
      --bg2: #e8e4dc;
      --bg3: #ddd8ce;
      --surface: rgba(255,255,255,0.72);
      --surface2: rgba(255,255,255,0.90);
      --border: rgba(0,0,0,0.08);
      --text: #1a1814;
      --text2: rgba(26,24,20,0.62);
      --text3: rgba(26,24,20,0.38);
      --gold: #8a6a18;
      --gold2: #b8962a;
      --accent-a: #6b4ecf;
      --accent-b: #2882c4;
      --accent-c: #c44040;
      --card-bg: linear-gradient(145deg, #2d2850 0%, #1e1b40 100%);
      --card-face: linear-gradient(160deg, #fffdf6 0%, #fdf5e4 100%);
      --glow: rgba(138,106,24,0.18);
      --shimmer: rgba(255,255,255,0.55);
    }

    /* ─── Reset & Base ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      overflow-x: hidden;
      transition: background var(--transition), color var(--transition);
    }

    /* ─── Background Orbs ─── */
    .bg-orbs {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      animation: float 12s ease-in-out infinite;
    }
    [data-theme="dark"] .orb1 { width: 500px; height: 500px; background: #7c3aed; top: -150px; left: -150px; animation-delay: 0s; }
    [data-theme="dark"] .orb2 { width: 400px; height: 400px; background: #1d4ed8; bottom: -100px; right: -100px; animation-delay: -4s; }
    [data-theme="dark"] .orb3 { width: 300px; height: 300px; background: #b45309; top: 40%; left: 50%; animation-delay: -8s; }
    [data-theme="light"] .orb1 { width: 500px; height: 500px; background: #c4b5fd; top: -150px; left: -150px; animation-delay: 0s; opacity: 0.25; }
    [data-theme="light"] .orb2 { width: 400px; height: 400px; background: #93c5fd; bottom: -100px; right: -100px; animation-delay: -4s; opacity: 0.22; }
    [data-theme="light"] .orb3 { width: 300px; height: 300px; background: #fcd34d; top: 40%; left: 50%; animation-delay: -8s; opacity: 0.2; }
    @keyframes float {
      0%, 100% { transform: translate(0,0) scale(1); }
      33%       { transform: translate(30px,-20px) scale(1.05); }
      66%       { transform: translate(-20px,30px) scale(0.96); }
    }

    /* ─── Layout ─── */
    .page {
      position: relative;
      z-index: 1;
      max-width: 960px;
      margin: 0 auto;
      padding: 24px 16px 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ─── Topbar ─── */
    .topbar {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 36px;
    }

    .brand {
      font-family: var(--font-display);
      font-size: clamp(13px, 2.5vw, 16px);
      color: var(--gold);
      letter-spacing: 1px;
    }

    /* Theme Toggle */
    .theme-toggle {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 30px;
      padding: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      backdrop-filter: blur(12px);
      transition: background var(--transition), border var(--transition);
    }
    .theme-toggle .pill {
      width: 32px;
      height: 28px;
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      transition: background var(--transition), transform 0.2s;
    }
    .theme-toggle .pill.active {
      background: var(--surface2);
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .theme-toggle:hover { border-color: var(--gold2); }

    /* ─── Header ─── */
    .hero {
      text-align: center;
      margin-bottom: 44px;
    }
    .hero-eyebrow {
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 14px;
      opacity: 0.85;
    }
    .hero-title {
      font-family: var(--font-display);
      font-size: clamp(26px, 6vw, 48px);
      line-height: 1.2;
      color: var(--text);
      margin-bottom: 14px;
    }
    .hero-title span {
      background: linear-gradient(135deg, var(--gold), var(--accent-a));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-sub {
      color: var(--text2);
      font-size: clamp(13px, 2vw, 15px);
      font-weight: 300;
      letter-spacing: 0.5px;
    }

    /* ─── Spread Selection ─── */
    .spread-picker {
      display: flex;
      gap: 10px;
      margin-bottom: 40px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .spread-chip {
      padding: 8px 20px;
      border-radius: 30px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text2);
      font-size: 13px;
      font-family: var(--font-body);
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: all var(--transition);
    }
    .spread-chip.active,
    .spread-chip:hover {
      border-color: var(--gold);
      color: var(--gold);
      background: rgba(232,201,106,0.08);
    }

    /* ─── Card Grid ─── */
    .spread-container {
      display: flex;
      gap: clamp(14px, 3vw, 28px);
      flex-wrap: wrap;
      justify-content: center;
      align-items: flex-start;
      margin-bottom: 48px;
      perspective: 1800px;
    }

    .spread-slot {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .slot-label-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .slot-num {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), var(--accent-a));
      display: flex; align-items: center; justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
    }
    .slot-label {
      color: var(--text2);
      font-size: 13px;
      letter-spacing: 1px;
    }

    /* ─── Card ─── */
    .tarot-card {
      width: clamp(110px, 22vw, 160px);
      height: clamp(192px, 38.5vw, 280px);
      cursor: pointer;
      position: relative;
      user-select: none;
    }
    .tarot-card:hover .card-inner { transform: rotateY(10deg) translateY(-4px); box-shadow: 0 20px 50px var(--glow), 0 0 0 1px rgba(232,201,106,0.15); }
    .tarot-card.is-flipped:hover .card-inner { transform: rotateY(180deg) translateY(-4px); }

    .card-inner {
      width: 100%; height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.75s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.35s;
      border-radius: var(--radius-card);
      box-shadow: 0 10px 30px rgba(0,0,0,0.35), 0 0 0 1px var(--border);
      will-change: transform;
    }
    .tarot-card.is-flipped .card-inner {
      transform: rotateY(180deg);
      box-shadow: 0 20px 60px var(--glow), 0 0 0 1.5px var(--gold2);
    }

    .card-front, .card-back {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      border-radius: var(--radius-card);
      overflow: hidden;
    }

    /* ── Card Back ── */
    .card-back {
      background: var(--card-bg);
      display: flex; align-items: center; justify-content: center;
      border: 2px solid rgba(232,201,106,0.3);
    }
    .back-design {
      width: 85%; height: 85%;
      border: 1px solid rgba(232,201,106,0.2);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .back-design::before {
      content: '';
      position: absolute;
      inset: 8px;
      border: 1px solid rgba(232,201,106,0.12);
      border-radius: 8px;
    }
    .back-star {
      font-size: clamp(28px, 6vw, 42px);
      animation: spin-slow 20s linear infinite;
      filter: drop-shadow(0 0 10px rgba(232,201,106,0.6));
    }
    @keyframes spin-slow { to { transform: rotate(360deg); } }

    /* ── Card Front ── */
    .card-front {
      background: var(--card-face);
      transform: rotateY(180deg);
      border: 2px solid rgba(232,201,106,0.5);
      display: flex; flex-direction: column; align-items: center; justify-content: space-between;
      padding: clamp(8px, 1.5vw, 14px);
    }
    .card-front-content {
      display: flex; flex-direction: column; align-items: center;
      width: 100%; height: 100%;
      transition: transform 0.3s;
    }
    .is-reversed .card-front-content { transform: rotate(180deg); }

    .card-header {
      width: 100%;
      display: flex; justify-content: space-between; align-items: center;
    }
    .card-num-badge {
      font-size: 10px; color: #999; font-weight: 300;
    }
    .card-orientation {
      font-size: 9px;
      padding: 2px 7px;
      border-radius: 8px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .card-orientation.upright { background: #dcfce7; color: #166534; }
    .card-orientation.reversed { background: #fee2e2; color: #991b1b; }

    .card-art-area {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      width: 100%;
    }
    .card-symbol {
      font-size: clamp(30px, 8vw, 52px);
      line-height: 1;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.15));
    }

    .card-divider {
      width: 70%;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(180,150,60,0.4), transparent);
      margin: 6px 0;
    }

    .card-name {
      font-size: clamp(11px, 2.2vw, 15px);
      font-weight: 700;
      color: #1a1a1a;
      text-align: center;
      letter-spacing: 0.5px;
      line-height: 1.3;
    }
    .card-suit-tag {
      font-size: clamp(9px, 1.8vw, 11px);
      color: #888;
      margin-top: 3px;
      letter-spacing: 1px;
    }
    .card-desc-text {
      font-size: clamp(8px, 1.5vw, 10px);
      color: #555;
      text-align: center;
      margin-top: 6px;
      line-height: 1.5;
      opacity: 0.8;
    }

    /* ─── Tap Hint ─── */
    .tap-hint {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; color: var(--text3);
      animation: pulse-fade 2.5s ease-in-out infinite;
    }
    @keyframes pulse-fade { 0%,100%{opacity:0.5} 50%{opacity:1} }

    /* ─── Controls ─── */
    .controls {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 32px;
      border-radius: var(--radius-btn);
      border: none;
      font-family: var(--font-body);
      font-size: 15px;
      cursor: pointer;
      transition: all 0.25s;
      letter-spacing: 0.3px;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      color: #0c0c14;
      font-weight: 700;
      box-shadow: 0 4px 20px rgba(184,150,42,0.35);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(184,150,42,0.5); }
    .btn-primary:active { transform: translateY(0); }
    .btn-secondary {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      backdrop-filter: blur(10px);
    }
    .btn-secondary:hover { border-color: var(--gold); color: var(--gold); background: rgba(232,201,106,0.07); }

    /* ─── Result Panel ─── */
    .result-panel {
      width: 100%;
      max-width: 680px;
      margin-top: 40px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 28px;
      backdrop-filter: blur(20px);
      display: none;
      animation: slide-up 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    .result-panel.visible { display: block; }
    @keyframes slide-up {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-title {
      font-family: var(--font-display);
      font-size: 14px;
      color: var(--gold);
      letter-spacing: 2px;
      margin-bottom: 20px;
      text-align: center;
    }

    .result-cards {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .result-row {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 16px;
      background: var(--shimmer);
      border-radius: 14px;
      border: 1px solid var(--border);
    }
    .result-badge {
      width: 42px; height: 42px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .badge-past   { background: linear-gradient(135deg, #6b4ecf22, #6b4ecf44); }
    .badge-now    { background: linear-gradient(135deg, #b4571022, #b4571044); }
    .badge-future { background: linear-gradient(135deg, #0f74a622, #0f74a644); }
    .result-info { flex: 1; }
    .result-position { font-size: 11px; color: var(--text3); letter-spacing: 1px; margin-bottom: 4px; }
    .result-card-name { font-size: 15px; font-weight: 600; color: var(--text); }
    .result-card-pos {
      display: inline-block;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 8px;
      margin-left: 6px;
      font-weight: 600;
    }
    .result-card-pos.up   { background: #dcfce7; color: #166534; }
    .result-card-pos.rev  { background: #fee2e2; color: #991b1b; }
    .result-meaning { font-size: 12px; color: var(--text2); margin-top: 5px; line-height: 1.6; }

    /* ─── Stars / Separator ─── */
    .star-sep {
      text-align: center;
      color: var(--gold);
      font-size: 13px;
      letter-spacing: 10px;
      opacity: 0.45;
      margin: 14px 0 0;
    }

    /* ─── Progress Dots ─── */
    .progress-dots {
      display: flex; gap: 8px; justify-content: center; margin-bottom: 28px;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--border);
      transition: background 0.3s, transform 0.3s;
    }
    .dot.done { background: var(--gold); transform: scale(1.2); }

    /* ─── Responsive ─── */
    @media (max-width: 520px) {
      .spread-container { gap: 10px; }
      .tarot-card { width: 95px; height: 165px; }
      .card-symbol { font-size: 26px; }
      .btn { padding: 12px 22px; font-size: 14px; }
    }
  </style>
</head>
<body>

<div class="bg-orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<div class="page">

  <!-- Topbar -->
  <div class="topbar">
    <div class="brand">✦ TAROT</div>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="切換主題">
      <div class="pill" id="pill-dark">🌙</div>
      <div class="pill" id="pill-light">☀️</div>
    </button>
  </div>

  <!-- Hero -->
  <div class="hero">
    <div class="hero-eyebrow">神秘塔羅占卜</div>
    <h1 class="hero-title">解讀你的<span>命運軌跡</span></h1>
    <p class="hero-sub">78 張完整牌組 · 正逆位占卜 · 洞察過去、現在、未來</p>
  </div>

  <!-- Spread Picker -->
  <div class="spread-picker">
    <button class="spread-chip active" onclick="selectSpread(this, 3)">🔺 聖三角（3張）</button>
    <button class="spread-chip" onclick="selectSpread(this, 5)">✦ 五芒星（5張）</button>
    <button class="spread-chip" onclick="selectSpread(this, 1)">◯ 單張每日（1張）</button>
  </div>

  <!-- Progress Dots -->
  <div class="progress-dots" id="progressDots"></div>

  <!-- Spread Area -->
  <div class="spread-container" id="spread"></div>

  <!-- Tap Hint -->
  <div class="tap-hint" id="tapHint">
    <span>👆</span><span>輕觸牌面揭示命運</span>
  </div>

  <!-- Controls -->
  <div class="controls" style="margin-top:28px;">
    <button class="btn btn-primary" onclick="shuffleAndReset()">
      🔮 重新洗牌
    </button>
    <button class="btn btn-secondary" onclick="revealAll()">
      ✨ 全部翻開
    </button>
  </div>

  <!-- Result Panel -->
  <div class="result-panel" id="resultPanel">
    <div class="result-title">✦ 牌陣解讀 ✦</div>
    <div class="result-cards" id="resultCards"></div>
    <div class="star-sep">· · ·</div>
  </div>

</div>

<script>
  /* ─── Data ─── */
  const majors = [
    { name:"愚者",   symbol:"🌟", desc:"新的開始，純真無畏地踏入未知。" },
    { name:"魔術師", symbol:"🌙", desc:"意志與技能的完美融合，掌握命運。" },
    { name:"女祭司", symbol:"🔮", desc:"直覺與神秘智慧，守護內在真相。" },
    { name:"皇后",   symbol:"🌿", desc:"豐盛、創造力與母性的溫柔力量。" },
    { name:"皇帝",   symbol:"⚡", desc:"權威與秩序，以意志建立穩固基礎。" },
    { name:"教皇",   symbol:"✝️", desc:"精神指引，尋求傳統智慧的庇護。" },
    { name:"戀人",   symbol:"💫", desc:"重要抉擇，關於愛與價值觀的考驗。" },
    { name:"戰車",   symbol:"🏆", desc:"意志力驅動勝利，克服重重阻礙。" },
    { name:"力量",   symbol:"🦁", desc:"溫柔的內在力量勝過野蠻的外力。" },
    { name:"隱士",   symbol:"🕯️", desc:"獨自尋求智慧，在靜默中找到答案。" },
    { name:"命運之輪", symbol:"☸️", desc:"循環不息，命運的轉折即將到來。" },
    { name:"正義",   symbol:"⚖️", desc:"因果平衡，公正的裁決將被揭示。" },
    { name:"倒吊人", symbol:"🌊", desc:"放下執著，從不同角度看待問題。" },
    { name:"死神",   symbol:"🥀", desc:"轉化與結束，為新生命清出空間。" },
    { name:"節制",   symbol:"🌈", desc:"耐心與調和，在流動中尋找平衡。" },
    { name:"惡魔",   symbol:"🔗", desc:"物質束縛，是時候打破自我的枷鎖。" },
    { name:"高塔",   symbol:"⚡", desc:"突如其來的衝擊，舊結構的崩塌。" },
    { name:"星星",   symbol:"⭐", desc:"希望的曙光，療癒與靈感的降臨。" },
    { name:"月亮",   symbol:"🌕", desc:"幻象與恐懼，潛意識的深層呼喚。" },
    { name:"太陽",   symbol:"☀️", desc:"喜悅與成功，光明照耀每個角落。" },
    { name:"審判",   symbol:"🎺", desc:"覺醒與召喚，過去的反思帶來解脫。" },
    { name:"世界",   symbol:"🌍", desc:"圓滿完成，整合一切後的豐盛境界。" }
  ];
  const suits = [
    { name:"權杖", symbol:"🔥", desc:"熱情與行動力的具體展現。" },
    { name:"聖杯", symbol:"💧", desc:"情感、直覺與深層關係的流動。" },
    { name:"寶劍", symbol:"💨", desc:"思想、溝通與挑戰的銳利刀鋒。" },
    { name:"錢幣", symbol:"🌱", desc:"物質、財富與務實行動的根基。" }
  ];
  const ranks = ["Ace","2","3","4","5","6","7","8","9","10","侍者","騎士","皇后","國王"];

  let fullDeck = [], selectedCards = [], flippedStatus = [], currentCount = 3;
  const positions3 = ["過去", "現在", "未來"];
  const positions5 = ["根基", "挑戰", "過去", "未來", "結果"];
  const positions1 = ["今日指引"];

  function getPositions(n) {
    if (n === 3) return positions3;
    if (n === 5) return positions5;
    return positions1;
  }

  function initDeck() {
    fullDeck = [...majors.map(m => ({ ...m, suit:"大阿爾克那" }))];
    suits.forEach(s => {
      ranks.forEach(r => {
        fullDeck.push({ name:`${r}`, suit:`${s.name}`, symbol: s.symbol, desc: s.desc });
      });
    });
  }

  function selectSpread(el, count) {
    document.querySelectorAll('.spread-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    currentCount = count;
    shuffleAndReset();
  }

  function shuffleAndReset() {
    initDeck();
    const shuffled = [...fullDeck].sort(() => Math.random() - 0.5);
    selectedCards = shuffled.slice(0, currentCount).map(c => ({ ...c, isReversed: Math.random() > 0.55 }));
    flippedStatus = Array(currentCount).fill(false);

    buildSpread();
    updateDots();
    document.getElementById('resultPanel').classList.remove('visible');
    document.getElementById('tapHint').style.display = 'flex';
  }

  function buildSpread() {
    const container = document.getElementById('spread');
    const positions = getPositions(currentCount);
    container.innerHTML = '';
    for (let i = 0; i < currentCount; i++) {
      const slot = document.createElement('div');
      slot.className = 'spread-slot';
      slot.innerHTML = `
        <div class="slot-label-wrap">
          <div class="slot-num">${i+1}</div>
          <div class="slot-label">${positions[i]}</div>
        </div>
        <div class="tarot-card" onclick="flip(this, ${i})" id="card-${i}">
          <div class="card-inner" id="inner-${i}">
            <div class="card-back">
              <div class="back-design">
                <div class="back-star">✦</div>
              </div>
            </div>
            <div class="card-front">
              <div class="card-front-content" id="content-${i}"></div>
            </div>
          </div>
        </div>`;
      container.appendChild(slot);
    }
  }

  function flip(el, index) {
    if (flippedStatus[index]) return;
    const data = selectedCards[index];
    const content = document.getElementById(`content-${index}`);
    const displayName = data.suit === '大阿爾克那'
      ? data.name
      : `${data.suit}${data.name}`;

    content.innerHTML = `
      <div class="card-header">
        <span class="card-num-badge">${index+1}/${currentCount}</span>
        <span class="card-orientation ${data.isReversed ? 'reversed' : 'upright'}">${data.isReversed ? '逆位' : '正位'}</span>
      </div>
      <div class="card-art-area">
        <div class="card-symbol">${data.symbol || '✦'}</div>
      </div>
      <div class="card-divider"></div>
      <div class="card-name">${displayName}</div>
      <div class="card-suit-tag">${data.suit}</div>
      <div class="card-desc-text">${data.desc}</div>
    `;

    if (data.isReversed) el.classList.add('is-reversed');
    el.classList.add('is-flipped');
    flippedStatus[index] = true;

    updateDots();

    if (flippedStatus.every(Boolean)) showResult();
  }

  function revealAll() {
    for (let i = 0; i < currentCount; i++) {
      if (!flippedStatus[i]) {
        const el = document.getElementById(`card-${i}`);
        if (el) flip(el, i);
      }
    }
  }

  function updateDots() {
    const dotsEl = document.getElementById('progressDots');
    dotsEl.innerHTML = '';
    flippedStatus.forEach(done => {
      const dot = document.createElement('div');
      dot.className = 'dot' + (done ? ' done' : '');
      dotsEl.appendChild(dot);
    });
    if (flippedStatus.every(Boolean)) {
      document.getElementById('tapHint').style.display = 'none';
    }
  }

  function showResult() {
    const panel = document.getElementById('resultPanel');
    const cards = document.getElementById('resultCards');
    const positions = getPositions(currentCount);
    const badgeClass = ['badge-past','badge-now','badge-future','badge-past','badge-now'];
    cards.innerHTML = '';
    selectedCards.forEach((c, i) => {
      const displayName = c.suit === '大阿爾克那' ? c.name : `${c.suit}${c.name}`;
      cards.innerHTML += `
        <div class="result-row">
          <div class="result-badge ${badgeClass[i] || 'badge-past'}">${c.symbol || '✦'}</div>
          <div class="result-info">
            <div class="result-position">${positions[i]}</div>
            <div class="result-card-name">${displayName}
              <span class="result-card-pos ${c.isReversed ? 'rev' : 'up'}">${c.isReversed ? '逆位' : '正位'}</span>
            </div>
            <div class="result-meaning">${c.desc}</div>
          </div>
        </div>`;
    });
    panel.classList.add('visible');
    setTimeout(() => panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 200);
  }

  /* ─── Theme ─── */
  function toggleTheme() {
    const html = document.documentElement;
    const isDark = html.getAttribute('data-theme') === 'dark';
    html.setAttribute('data-theme', isDark ? 'light' : 'dark');
    document.getElementById('pill-dark').classList.toggle('active', !isDark);
    document.getElementById('pill-light').classList.toggle('active', isDark);
  }

  /* ─── Init ─── */
  document.getElementById('pill-dark').classList.add('active');
  shuffleAndReset();
</script>
</body>
</html>
