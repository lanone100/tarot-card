<!DOCTYPE html>
<html lang="zh-Hant" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>塔羅 · 神秘占卜</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600;700&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet"/>
<style>
:root{--radius-card:20px;--radius-btn:50px;--transition:.35s cubic-bezier(.4,0,.2,1);--font-display:'Cinzel Decorative',serif;--font-body:'Noto Serif TC',serif}
[data-theme="dark"]{--bg:#0c0c14;--bg2:#13131f;--bg3:#1c1c2e;--surface:rgba(255,255,255,.06);--surface2:rgba(255,255,255,.10);--border:rgba(255,255,255,.12);--text:#f0eee8;--text2:rgba(240,238,232,.65);--text3:rgba(240,238,232,.38);--gold:#e8c96a;--gold2:#b8962a;--accent-a:#9b7de8;--accent-b:#6dc0f5;--accent-c:#f08080;--card-bg:linear-gradient(145deg,#1c1a32 0%,#131224 100%);--card-face:linear-gradient(160deg,#fdf8ee 0%,#f5edd8 100%);--glow:rgba(232,201,106,.25);--shimmer:rgba(255,255,255,.04)}
[data-theme="light"]{--bg:#f2f0ec;--bg2:#e8e4dc;--bg3:#ddd8ce;--surface:rgba(255,255,255,.72);--surface2:rgba(255,255,255,.90);--border:rgba(0,0,0,.08);--text:#1a1814;--text2:rgba(26,24,20,.62);--text3:rgba(26,24,20,.38);--gold:#8a6a18;--gold2:#b8962a;--accent-a:#6b4ecf;--accent-b:#2882c4;--accent-c:#c44040;--card-bg:linear-gradient(145deg,#2d2850 0%,#1e1b40 100%);--card-face:linear-gradient(160deg,#fffdf6 0%,#fdf5e4 100%);--glow:rgba(138,106,24,.18);--shimmer:rgba(255,255,255,.55)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;overflow-x:hidden;transition:background var(--transition),color var(--transition)}
#starCanvas{position:fixed;inset:0;pointer-events:none;z-index:0}
#vfxCanvas{position:fixed;inset:0;pointer-events:none;z-index:9998}
#screenFlash{position:fixed;inset:0;pointer-events:none;z-index:9997;opacity:0;background:radial-gradient(ellipse at center,rgba(232,201,106,.55),transparent 70%);transition:opacity .08s}
.bg-orbs{position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.18;animation:float 12s ease-in-out infinite}
[data-theme="dark"] .orb1{width:500px;height:500px;background:#7c3aed;top:-150px;left:-150px}
[data-theme="dark"] .orb2{width:400px;height:400px;background:#1d4ed8;bottom:-100px;right:-100px;animation-delay:-4s}
[data-theme="dark"] .orb3{width:300px;height:300px;background:#b45309;top:40%;left:50%;animation-delay:-8s}
[data-theme="light"] .orb1{width:500px;height:500px;background:#c4b5fd;top:-150px;left:-150px;opacity:.25}
[data-theme="light"] .orb2{width:400px;height:400px;background:#93c5fd;bottom:-100px;right:-100px;animation-delay:-4s;opacity:.22}
[data-theme="light"] .orb3{width:300px;height:300px;background:#fcd34d;top:40%;left:50%;animation-delay:-8s;opacity:.2}
@keyframes float{0%,100%{transform:translate(0,0)scale(1)}33%{transform:translate(30px,-20px)scale(1.05)}66%{transform:translate(-20px,30px)scale(.96)}}
.page{position:relative;z-index:2;max-width:960px;margin:0 auto;padding:24px 16px 60px;display:flex;flex-direction:column;align-items:center}
.topbar{width:100%;display:flex;justify-content:space-between;align-items:center;margin-bottom:36px}
.brand{font-family:var(--font-display);font-size:clamp(13px,2.5vw,16px);color:var(--gold);letter-spacing:1px}
.topbar-right{display:flex;gap:10px;align-items:center}
.theme-toggle{background:var(--surface);border:1px solid var(--border);border-radius:30px;padding:6px;cursor:pointer;display:flex;align-items:center;gap:4px;backdrop-filter:blur(12px);transition:background var(--transition),border var(--transition)}
.theme-toggle .pill{width:32px;height:28px;border-radius:22px;display:flex;align-items:center;justify-content:center;font-size:15px;transition:background var(--transition)}
.theme-toggle .pill.active{background:var(--surface2);box-shadow:0 2px 8px rgba(0,0,0,.15)}
.theme-toggle:hover{border-color:var(--gold2)}
.sound-btn{background:var(--surface);border:1px solid var(--border);border-radius:22px;padding:7px 15px;cursor:pointer;font-size:12px;color:var(--text3);backdrop-filter:blur(10px);transition:all var(--transition);font-family:var(--font-body);letter-spacing:.5px}
.sound-btn:hover,.sound-btn.on{border-color:var(--gold);color:var(--gold);background:rgba(232,201,106,.08)}
.hero{text-align:center;margin-bottom:44px}
.hero-eyebrow{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:14px;opacity:.85}
.hero-title{font-family:var(--font-display);font-size:clamp(26px,6vw,48px);line-height:1.2;color:var(--text);margin-bottom:14px}
.hero-title span{background:linear-gradient(135deg,var(--gold),var(--accent-a));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{color:var(--text2);font-size:clamp(13px,2vw,15px);font-weight:300;letter-spacing:.5px}
.spread-picker{display:flex;gap:10px;margin-bottom:40px;flex-wrap:wrap;justify-content:center}
.spread-chip{padding:8px 20px;border-radius:30px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:13px;font-family:var(--font-body);cursor:pointer;backdrop-filter:blur(10px);transition:all var(--transition)}
.spread-chip.active,.spread-chip:hover{border-color:var(--gold);color:var(--gold);background:rgba(232,201,106,.08)}
.spread-container{display:flex;gap:clamp(14px,3vw,28px);flex-wrap:wrap;justify-content:center;align-items:flex-start;margin-bottom:48px;perspective:1800px}
.spread-slot{display:flex;flex-direction:column;align-items:center;gap:14px;opacity:0}
.slot-label-wrap{display:flex;flex-direction:column;align-items:center;gap:4px}
.slot-num{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--accent-a));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}
.slot-label{color:var(--text2);font-size:13px;letter-spacing:1px}
.tarot-card{width:clamp(110px,22vw,160px);height:clamp(192px,38.5vw,280px);cursor:pointer;position:relative;user-select:none}
.tarot-card:hover .card-inner{transform:rotateY(10deg) translateY(-4px);box-shadow:0 20px 50px var(--glow),0 0 0 1px rgba(232,201,106,.15)}
.tarot-card.is-flipped:hover .card-inner{transform:rotateY(180deg) translateY(-4px)}
.card-inner{width:100%;height:100%;transform-style:preserve-3d;transition:transform .75s cubic-bezier(.4,0,.2,1),box-shadow .35s;border-radius:var(--radius-card);box-shadow:0 10px 30px rgba(0,0,0,.35),0 0 0 1px var(--border);will-change:transform}
.tarot-card.is-flipped .card-inner{transform:rotateY(180deg);box-shadow:0 20px 60px var(--glow),0 0 0 1.5px var(--gold2)}
@keyframes aura-pulse{0%{box-shadow:0 0 0 0 rgba(232,201,106,.8),0 20px 60px var(--glow)}50%{box-shadow:0 0 0 22px rgba(232,201,106,0),0 20px 60px var(--glow)}100%{box-shadow:0 0 0 0 rgba(232,201,106,0),0 20px 60px var(--glow)}}
.tarot-card.just-flipped .card-inner{animation:aura-pulse .85s ease-out}
.card-front,.card-back{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--radius-card);overflow:hidden}
.card-back{background:var(--card-bg);display:flex;align-items:center;justify-content:center;border:2px solid rgba(232,201,106,.3)}
.back-design{width:85%;height:85%;border:1px solid rgba(232,201,106,.2);border-radius:12px;display:flex;align-items:center;justify-content:center;position:relative}
.back-design::before{content:'';position:absolute;inset:8px;border:1px solid rgba(232,201,106,.12);border-radius:8px}
.back-star{font-size:clamp(28px,6vw,42px);animation:spin-slow 20s linear infinite;filter:drop-shadow(0 0 10px rgba(232,201,106,.6))}
@keyframes spin-slow{to{transform:rotate(360deg)}}
.card-front{background:var(--card-face);transform:rotateY(180deg);border:2px solid rgba(232,201,106,.5);display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:clamp(8px,1.5vw,14px)}
.card-front-content{display:flex;flex-direction:column;align-items:center;width:100%;height:100%;transition:transform .3s}
.is-reversed .card-front-content{transform:rotate(180deg)}
.card-header{width:100%;display:flex;justify-content:space-between;align-items:center}
.card-num-badge{font-size:10px;color:#999;font-weight:300}
.card-orientation{font-size:9px;padding:2px 7px;border-radius:8px;font-weight:600;letter-spacing:.5px}
.card-orientation.upright{background:#dcfce7;color:#166534}
.card-orientation.reversed{background:#fee2e2;color:#991b1b}
.card-art-area{flex:1;display:flex;align-items:center;justify-content:center;width:100%}
.card-symbol{font-size:clamp(30px,8vw,52px);line-height:1;filter:drop-shadow(0 2px 8px rgba(0,0,0,.15))}
.card-divider{width:70%;height:1px;background:linear-gradient(to right,transparent,rgba(180,150,60,.4),transparent);margin:6px 0}
.card-name{font-size:clamp(11px,2.2vw,15px);font-weight:700;color:#1a1a1a;text-align:center;letter-spacing:.5px;line-height:1.3}
.card-suit-tag{font-size:clamp(9px,1.8vw,11px);color:#888;margin-top:3px;letter-spacing:1px}
.card-desc-text{font-size:clamp(8px,1.5vw,10px);color:#555;text-align:center;margin-top:6px;line-height:1.5;opacity:.8}
.tap-hint{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text3);animation:pulse-fade 2.5s ease-in-out infinite}
@keyframes pulse-fade{0%,100%{opacity:.5}50%{opacity:1}}
.controls{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
.btn{display:inline-flex;align-items:center;gap:8px;padding:14px 32px;border-radius:var(--radius-btn);border:none;font-family:var(--font-body);font-size:15px;cursor:pointer;transition:all .25s;letter-spacing:.3px}
.btn-primary{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0c0c14;font-weight:700;box-shadow:0 4px 20px rgba(184,150,42,.35)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(184,150,42,.5)}
.btn-primary:active{transform:translateY(0)}
.btn-primary.shuffling{pointer-events:none;opacity:.6}
.btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border);backdrop-filter:blur(10px)}
.btn-secondary:hover{border-color:var(--gold);color:var(--gold);background:rgba(232,201,106,.07)}
.progress-dots{display:flex;gap:8px;justify-content:center;margin-bottom:28px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:background .3s,transform .3s}
.dot.done{background:var(--gold);transform:scale(1.2)}
.result-panel{width:100%;max-width:680px;margin-top:40px;background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:28px;backdrop-filter:blur(20px);display:none;animation:slide-up .5s cubic-bezier(.4,0,.2,1) forwards}
.result-panel.visible{display:block}
@keyframes slide-up{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.result-title{font-family:var(--font-display);font-size:14px;color:var(--gold);letter-spacing:2px;margin-bottom:20px;text-align:center}
.result-cards{display:flex;flex-direction:column;gap:14px}
.result-row{display:flex;align-items:flex-start;gap:16px;padding:16px;background:var(--shimmer);border-radius:14px;border:1px solid var(--border)}
.result-badge{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.badge-past{background:linear-gradient(135deg,#6b4ecf22,#6b4ecf44)}.badge-now{background:linear-gradient(135deg,#b4571022,#b4571044)}.badge-future{background:linear-gradient(135deg,#0f74a622,#0f74a644)}
.result-info{flex:1}
.result-position{font-size:11px;color:var(--text3);letter-spacing:1px;margin-bottom:4px}
.result-card-name{font-size:15px;font-weight:600;color:var(--text)}
.result-card-pos{display:inline-block;font-size:10px;padding:2px 8px;border-radius:8px;margin-left:6px;font-weight:600}
.result-card-pos.up{background:#dcfce7;color:#166534}.result-card-pos.rev{background:#fee2e2;color:#991b1b}
.result-meaning{font-size:12px;color:var(--text2);margin-top:5px;line-height:1.6}
.star-sep{text-align:center;color:var(--gold);font-size:13px;letter-spacing:10px;opacity:.45;margin:14px 0 0}
.shuffle-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:998;transition:background .3s;pointer-events:none}
.shuffle-backdrop.active{background:rgba(0,0,0,.65);pointer-events:all}
[data-theme="light"] .shuffle-backdrop.active{background:rgba(0,0,0,.35)}
.shuffle-status{position:fixed;bottom:44px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(232,201,106,.12);border:1px solid rgba(232,201,106,.3);color:var(--gold);font-size:13px;letter-spacing:3px;padding:10px 28px;border-radius:30px;backdrop-filter:blur(12px);z-index:1001;opacity:0;transition:opacity .3s,transform .3s;white-space:nowrap}
.shuffle-status.visible{opacity:1;transform:translateX(-50%) translateY(0)}
.fly-card{position:fixed;z-index:1100;border-radius:12px;background:linear-gradient(145deg,#1c1a32,#131224);border:1.5px solid rgba(232,201,106,.45);display:flex;align-items:center;justify-content:center;font-size:22px;color:rgba(232,201,106,.8);box-shadow:0 8px 28px rgba(0,0,0,.6);will-change:transform,opacity;pointer-events:none}
[data-theme="light"] .fly-card{background:linear-gradient(145deg,#2d2850,#1e1b40)}
@keyframes deal-in-pop{0%{opacity:0;transform:scale(.72) translateY(-18px)}65%{opacity:1;transform:scale(1.06) translateY(4px)}85%{transform:scale(.97) translateY(-2px)}100%{opacity:1;transform:scale(1) translateY(0)}}
.deal-in{animation:deal-in-pop .55s cubic-bezier(.34,1.4,.64,1) forwards!important}
.rune-stamp{position:fixed;pointer-events:none;z-index:9999;font-size:clamp(28px,5vw,44px);animation:rune-appear .95s ease forwards}
@keyframes rune-appear{0%{opacity:0;transform:translate(-50%,-50%)scale(.35) rotate(-25deg)}40%{opacity:1;transform:translate(-50%,-50%)scale(1.18) rotate(4deg)}70%{transform:translate(-50%,-50%)scale(.96) rotate(-1deg)}100%{opacity:0;transform:translate(-50%,-50%)scale(1.3) rotate(0deg)}}
@media(max-width:520px){.spread-container{gap:10px}.tarot-card{width:95px;height:165px}.card-symbol{font-size:26px}.btn{padding:12px 22px;font-size:14px}}
</style>
</head>
<body>
<canvas id="starCanvas"></canvas>
<canvas id="vfxCanvas"></canvas>
<div id="screenFlash"></div>
<div class="bg-orbs"><div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div></div>
<div class="shuffle-backdrop" id="shuffleBackdrop"></div>
<div class="shuffle-status" id="shuffleStatus"></div>

<div class="page">
  <div class="topbar">
    <div class="brand">✦ TAROT</div>
    <div class="topbar-right">
      <button class="sound-btn" id="soundBtn" onclick="toggleSound()">🔇 音效</button>
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="切換主題">
        <div class="pill" id="pill-dark">🌙</div>
        <div class="pill" id="pill-light">☀️</div>
      </button>
    </div>
  </div>

  <div class="hero">
    <div class="hero-eyebrow">神秘塔羅占卜</div>
    <h1 class="hero-title">解讀你的<span>命運軌跡</span></h1>
    <p class="hero-sub">78 張完整牌組 · 正逆位占卜 · 洞察過去、現在、未來</p>
  </div>

  <div class="spread-picker">
    <button class="spread-chip active" onclick="selectSpread(this,3)">🔺 聖三角（3張）</button>
    <button class="spread-chip" onclick="selectSpread(this,5)">✦ 五芒星（5張）</button>
    <button class="spread-chip" onclick="selectSpread(this,1)">◯ 單張每日（1張）</button>
  </div>

  <div class="progress-dots" id="progressDots"></div>
  <div class="spread-container" id="spread"></div>
  <div class="tap-hint" id="tapHint"><span>👆</span><span>輕觸牌面揭示命運</span></div>

  <div class="controls" style="margin-top:28px">
    <button class="btn btn-primary" onclick="shuffleAndReset()">🔮 重新洗牌</button>
    <button class="btn btn-secondary" onclick="revealAll()">✨ 全部翻開</button>
  </div>

  <div class="result-panel" id="resultPanel">
    <div class="result-title">✦ 牌陣解讀 ✦</div>
    <div class="result-cards" id="resultCards"></div>
    <div class="star-sep">· · ·</div>
  </div>
</div>

<script>
/* ══════════════════════════════════════
   AUDIO  (Web Audio API — zero files)
══════════════════════════════════════ */
let audioCtx=null, soundOn=false;
function getAC(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}

function toggleSound(){
  soundOn=!soundOn;
  const btn=document.getElementById('soundBtn');
  btn.textContent=soundOn?'🔊 音效':'🔇 音效';
  btn.classList.toggle('on',soundOn);
  if(soundOn){getAC();snd('chime');}
}

function snd(type){
  if(!soundOn)return;
  const ac=getAC();
  if(ac.state==='suspended')ac.resume();
  const t=ac.currentTime;

  if(type==='shuffle'){
    // Whooshing noise bursts
    for(let i=0;i<7;i++) setTimeout(()=>{
      const buf=ac.createBuffer(1,ac.sampleRate*.07,ac.sampleRate);
      const d=buf.getChannelData(0);
      for(let j=0;j<d.length;j++)d[j]=(Math.random()*2-1)*Math.exp(-j/(d.length*.22));
      const s=ac.createBufferSource();s.buffer=buf;
      const f=ac.createBiquadFilter();f.type='bandpass';f.frequency.value=700+Math.random()*1400;f.Q.value=2.5;
      const g=ac.createGain();g.gain.value=.16+Math.random()*.12;
      s.connect(f);f.connect(g);g.connect(ac.destination);s.start();
    },i*100);
  }

  if(type==='riffle'){
    for(let i=0;i<16;i++) setTimeout(()=>{
      const o=ac.createOscillator(),g=ac.createGain();
      o.type='triangle';
      o.frequency.setValueAtTime(250+i*15+Math.random()*35,ac.currentTime);
      o.frequency.exponentialRampToValueAtTime(70,ac.currentTime+.065);
      g.gain.setValueAtTime(.2,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.07);
      o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+.075);
    },i*48+Math.random()*18);
  }

  if(type==='whoosh'){
    const buf=ac.createBuffer(1,ac.sampleRate*.42,ac.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.6);
    const s=ac.createBufferSource();s.buffer=buf;
    const f=ac.createBiquadFilter();f.type='bandpass';
    f.frequency.setValueAtTime(3200,t);f.frequency.exponentialRampToValueAtTime(220,t+.42);f.Q.value=2.8;
    const g=ac.createGain();g.gain.setValueAtTime(.28,t);g.gain.exponentialRampToValueAtTime(.001,t+.42);
    s.connect(f);f.connect(g);g.connect(ac.destination);s.start();
  }

  if(type==='chime'){
    [523.25,659.25,783.99,1046.5].forEach((f,i)=>{
      const o=ac.createOscillator(),g=ac.createGain();
      o.type='sine';o.frequency.value=f;
      g.gain.setValueAtTime(0,t+i*.075);g.gain.linearRampToValueAtTime(.17,t+i*.075+.025);g.gain.exponentialRampToValueAtTime(.001,t+i*.075+1.3);
      o.connect(g);g.connect(ac.destination);o.start(t+i*.075);o.stop(t+i*.075+1.4);
    });
    const o2=ac.createOscillator(),g2=ac.createGain();
    o2.type='sine';o2.frequency.value=2093;
    g2.gain.setValueAtTime(0,t);g2.gain.linearRampToValueAtTime(.05,t+.05);g2.gain.exponentialRampToValueAtTime(.001,t+1.9);
    o2.connect(g2);g2.connect(ac.destination);o2.start(t);o2.stop(t+2);
  }

  if(type==='flip'){
    const o=ac.createOscillator(),g=ac.createGain();
    o.type='sine';o.frequency.setValueAtTime(480,t);o.frequency.exponentialRampToValueAtTime(210,t+.14);
    g.gain.setValueAtTime(.28,t);g.gain.exponentialRampToValueAtTime(.001,t+.2);
    o.connect(g);g.connect(ac.destination);o.start(t);o.stop(t+.22);
    [900,1380].forEach((f,i)=>{
      const o2=ac.createOscillator(),g2=ac.createGain();
      o2.type='sine';o2.frequency.value=f;
      g2.gain.setValueAtTime(.07,t+.025+i*.015);g2.gain.exponentialRampToValueAtTime(.001,t+.4+i*.1);
      o2.connect(g2);g2.connect(ac.destination);o2.start(t+.025+i*.015);o2.stop(t+.5);
    });
  }

  if(type==='reveal'){
    [261.63,329.63,392,523.25,659.25,1046.5].forEach((f,i)=>{
      const o=ac.createOscillator(),g=ac.createGain();
      o.type='sine';o.frequency.value=f;
      g.gain.setValueAtTime(0,t+i*.068);g.gain.linearRampToValueAtTime(.18,t+i*.068+.04);g.gain.exponentialRampToValueAtTime(.001,t+i*.068+.55);
      o.connect(g);g.connect(ac.destination);o.start(t+i*.068);o.stop(t+i*.068+.6);
    });
  }

  if(type==='land'){
    const o=ac.createOscillator(),g=ac.createGain();
    o.type='sine';o.frequency.setValueAtTime(110,t);o.frequency.exponentialRampToValueAtTime(55,t+.11);
    g.gain.setValueAtTime(.32,t);g.gain.exponentialRampToValueAtTime(.001,t+.15);
    o.connect(g);g.connect(ac.destination);o.start(t);o.stop(t+.17);
  }
}

══════════════════════════════════════ */
const vc=document.getElementById('vfxCanvas');
const vx=vc.getContext('2d');
const vResize=()=>{vc.width=window.innerWidth;vc.height=window.innerHeight;};
vResize();window.addEventListener('resize',vResize);

const VP=[],VR=[];let vRunning=false;

function addBurst(x,y,n=22,type='default'){
  const P=type==='gold'?['#e8c96a','#ffd700','#fffacd','#b8962a','#fff8e1']:
           type==='magic'?['#9b7de8','#6dc0f5','#f08080','#e8c96a','#fff']:
           ['#e8c96a','#9b7de8','#6dc0f5','#f08080','#fff'];
  for(let i=0;i<n;i++){
    const a=(Math.PI*2*i/n)+Math.random()*.45;
    const sp=55+Math.random()*150;
    VP.push({x,y,vx:Math.cos(a)*sp*.017,vy:Math.sin(a)*sp*.017-2.2,ax:0,ay:.2,
      r:2+Math.random()*4.5,color:P[Math.floor(Math.random()*P.length)],
      alpha:1,life:1,decay:.011+Math.random()*.018,shape:Math.random()>.55?'star':'circle'});
  }
  VR.push({x,y,r:0,maxR:70+Math.random()*70,alpha:1,color:P[0]});
}

function addTrail(x,y){
  for(let i=0;i<5;i++) VP.push({
    x:x+(Math.random()-.5)*22,y:y+(Math.random()-.5)*22,
    vx:(Math.random()-.5)*.6,vy:-Math.random()*.9,ax:0,ay:-.025,
    r:1.5+Math.random()*2.5,color:'#e8c96a',alpha:.85,life:1,decay:.028+Math.random()*.03,shape:'circle'
  });
}

function drawStar5(ctx,x,y,r,col,al){
  ctx.save();ctx.globalAlpha=al;ctx.fillStyle=col;ctx.beginPath();
  for(let i=0;i<5;i++){const a=Math.PI/2+i*Math.PI*.4,a2=a+Math.PI*.2;
    i===0?ctx.moveTo(x+Math.cos(a)*r,y+Math.sin(a)*r):ctx.lineTo(x+Math.cos(a)*r,y+Math.sin(a)*r);
    ctx.lineTo(x+Math.cos(a2)*r*.42,y+Math.sin(a2)*r*.42);}
  ctx.closePath();ctx.fill();ctx.restore();
}

function vfxLoop(){
  vx.clearRect(0,0,vc.width,vc.height);
  for(let i=VR.length-1;i>=0;i--){
    const r=VR[i];r.r+=3.2;r.alpha=Math.max(0,1-r.r/r.maxR);
    if(r.alpha<=0){VR.splice(i,1);continue;}
    vx.beginPath();vx.arc(r.x,r.y,r.r,0,Math.PI*2);
    vx.strokeStyle=r.color;vx.globalAlpha=r.alpha*.55;vx.lineWidth=1.8;vx.stroke();vx.globalAlpha=1;
  }
  for(let i=VP.length-1;i>=0;i--){
    const p=VP[i];p.vx+=p.ax;p.vy+=p.ay;p.x+=p.vx;p.y+=p.vy;p.alpha-=p.decay;p.life=p.alpha;
    if(p.life<=0){VP.splice(i,1);continue;}
    if(p.shape==='star')drawStar5(vx,p.x,p.y,p.r,p.color,p.alpha);
    else{vx.beginPath();vx.arc(p.x,p.y,p.r,0,Math.PI*2);vx.fillStyle=p.color;vx.globalAlpha=p.alpha;vx.fill();vx.globalAlpha=1;}
  }
  if(VP.length>0||VR.length>0)requestAnimationFrame(vfxLoop);else vRunning=false;
}

function triggerVFX(x,y,n,type){
  addBurst(x,y,n,type);
  if(!vRunning){vRunning=true;vfxLoop();}
}

function phase_riffle(cards,cx,cy,cw,ch,rounds,done){
  setStatus("洗牌中...");
  const half=Math.floor(cards.length/2);
  let r=0;
  function round(){
    if(r>=rounds){done();return;}
    snd('riffle');
    cards.forEach((fc,i)=>{
      const side=i<half?-1:1,off=i<half?i:i-half;
      fc.style.transition='transform .2s cubic-bezier(.4,0,.2,1)';
      fc.style.transform=`translate(${side*(cw*.62+off*2.5)}px,${off*2}px) rotate(${side*(10+off*1.5)}deg)`;
    });
    setTimeout(()=>{
      cards.forEach((fc,i)=>setTimeout(()=>{
        fc.style.transition='transform .16s ease-out';
        fc.style.transform=`translate(${(i-cards.length/2)*2.5}px,${-i*1.5}px) rotate(${(i-cards.length/2)*3}deg)`;
      },i*16));
      r++;setTimeout(round,cards.length*16+260);
    },290);
  }
  round();

function buildSpread(hidden=false){

function flip(el,index){

  const data=selectedCards[index];

  const dn=data.suit==='大阿爾克那'?data.name:`${data.suit}${data.name}`;

    <div class="card-suit-tag">${data.suit}</div><div class="card-desc-text">${data.desc}</div>`;
  if(data.isReversed)el.classList.add('is-reversed');
  el.classList.add('is-flipped','just-flipped');

  const cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
  triggerVFX(cx,cy,24,data.isReversed?'magic':'gold');

function toggleTheme(){
  const html=document.documentElement;
  const isDark=html.getAttribute('data-theme')==='dark';
  html.setAttribute('data-theme',isDark?'light':'dark');
  document.getElementById('pill-dark').classList.toggle('active',!isDark);
  document.getElementById('pill-light').classList.toggle('active',isDark);
  snd('chime');
  triggerVFX(window.innerWidth/2,50,14,'magic');
}
