<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>78張完整塔羅牌陣 - 聖三角</title>
    <style>
        :root {
            --gold: #d4af37;
            --dark-bg: #0a0a12;
            --card-white: #fefcf8;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        h1 { color: var(--gold); letter-spacing: 3px; margin-bottom: 5px; }
        .subtitle { color: #888; margin-bottom: 30px; font-size: 14px; }

        /* 牌陣佈局 */
        .spread-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            perspective: 1500px;
        }

        .spread-slot {
            text-align: center;
        }

        .slot-label {
            margin-bottom: 10px;
            color: var(--gold);
            font-weight: bold;
            font-size: 1.1rem;
        }

        /* 牌卡結構 */
        .tarot-card {
            width: 160px;
            height: 280px;
            cursor: pointer;
            position: relative;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .is-flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 10px;
            border: 3px solid var(--gold);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .card-back {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            background-image: repeating-linear-gradient(45deg, rgba(212,175,55,0.05) 0, rgba(212,175,55,0.05) 2px, transparent 2px, transparent 10px);
        }

        .card-back::after {
            content: "✡";
            font-size: 40px;
            color: var(--gold);
        }

        .card-front {
            background: var(--card-white);
            color: #222;
            transform: rotateY(180deg);
        }

        .card-name { font-weight: bold; margin-top: 10px; font-size: 16px; }
        .card-suit { font-size: 12px; color: #666; }
        .card-desc { font-size: 11px; margin-top: 10px; color: #444; text-align: center; }

        /* 逆位視覺處理 */
        .is-reversed .card-front-content {
            transform: rotate(180deg);
        }

        /* 控制按鈕 */
        .controls { margin-top: 40px; }
        button {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 10px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }
        button:hover {
            background: var(--gold);
            color: var(--dark-bg);
        }
    </style>
</head>
<body>

    <h1>神秘聖三角牌陣</h1>
    <div class="subtitle">點擊卡片揭示：過去、現在、未來</div>

    <div class="spread-container" id="spread">
        <div class="spread-slot">
            <div class="slot-label">過去</div>
            <div class="tarot-card" onclick="flip(this, 0)">
                <div class="card-inner" id="inner-0">
                    <div class="card-back"></div>
                    <div class="card-front"><div class="card-front-content" id="content-0"></div></div>
                </div>
            </div>
        </div>
        <div class="spread-slot">
            <div class="slot-label">現在</div>
            <div class="tarot-card" onclick="flip(this, 1)">
                <div class="card-inner" id="inner-1">
                    <div class="card-back"></div>
                    <div class="card-front"><div class="card-front-content" id="content-1"></div></div>
                </div>
            </div>
        </div>
        <div class="spread-slot">
            <div class="slot-label">未來</div>
            <div class="tarot-card" onclick="flip(this, 2)">
                <div class="card-inner" id="inner-2">
                    <div class="card-back"></div>
                    <div class="card-front"><div class="card-front-content" id="content-2"></div></div>
                </div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button onclick="shuffleAndReset()">重新洗牌</button>
    </div>

    <script>
        // 建立 78 張牌的完整資料庫
        const majors = ["愚者", "魔術師", "女祭司", "皇后", "皇帝", "教皇", "戀人", "戰車", "力量", "隱士", "命運之輪", "正義", "倒吊人", "死神", "節制", "惡魔", "高塔", "星星", "月亮", "太陽", "審判", "世界"];
        const suits = ["權杖", "聖杯", "寶劍", "錢幣"];
        const ranks = ["Ace", "2", "3", "4", "5", "6", "7", "8", "9", "10", "侍者", "騎士", "皇后", "國王"];

        let fullDeck = [];

        // 初始化牌組
        function initDeck() {
            fullDeck = [];
            // 大阿爾克那 (0-21)
            majors.forEach((name, i) => {
                fullDeck.push({ name: name, suit: "大阿爾克那", desc: "主導命運的精神力量。" });
            });
            // 小阿爾克那
            suits.forEach(suit => {
                ranks.forEach(rank => {
                    fullDeck.push({ name: `${suit}${rank}`, suit: suit, desc: "生活中的具體事件與情緒。" });
                });
            });
        }

        let selectedCards = [];
        let flippedStatus = [false, false, false];

        function shuffleAndReset() {
            initDeck();
            // 洗牌後選取三張
            const shuffled = fullDeck.sort(() => 0.5 - Math.random());
            selectedCards = shuffled.slice(0, 3).map(card => ({
                ...card,
                isReversed: Math.random() > 0.5
            }));

            // 重置 DOM
            for(let i=0; i<3; i++) {
                const cardElement = document.querySelectorAll('.tarot-card')[i];
                cardElement.classList.remove('is-flipped', 'is-reversed');
                flippedStatus[i] = false;
            }
        }

        function flip(el, index) {
            if (flippedStatus[index]) return;

            const data = selectedCards[index];
            const content = document.getElementById(`content-${index}`);
            
            // 填充內容
            content.innerHTML = `
                <div class="card-suit">${data.suit}</div>
                <div class="card-name">${data.name}</div>
                <div style="font-size:12px; margin-top:5px; color:${data.isReversed ? 'red' : 'green'}">
                    ${data.isReversed ? '【逆位】' : '【正位】'}
                </div>
                <div class="card-desc">${data.desc}</div>
            `;

            if (data.isReversed) {
                el.classList.add('is-reversed');
            }

            el.classList.add('is-flipped');
            flippedStatus[index] = true;
        }

        // 初始執行
        shuffleAndReset();
    </script>
</body>
</html>
